<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 年会抽奖系统</title>
<style>
  /* ===== 全局重置 ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #FFD700;
    --gold-deep: #E6B800;
    --red: #C8102E;
    --red-light: #E8213E;
    --bg-dark: #0A0A1A;
    --bg-card: rgba(255,255,255,0.06);
    --text: #FFFFFF;
    --text-muted: rgba(255,255,255,0.6);
    --first: #FF6B35;
    --second: #C0C0C0;
    --third: #CD7F32;
  }

  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg-dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== 星空背景 ===== */
  #starfield {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 20% 30%, #1a0533 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, #0d1a3a 0%, transparent 50%),
                linear-gradient(135deg, #0A0A1A 0%, #12071f 50%, #071228 100%);
  }

  .star {
    position: absolute; border-radius: 50%;
    background: #FFF; animation: twinkle linear infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  /* ===== 导航 ===== */
  .nav {
    position: relative; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 40px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,215,0,0.2);
  }

  .nav-logo {
    display: flex; align-items: center; gap: 12px;
    font-size: 22px; font-weight: 700;
    background: linear-gradient(90deg, #FFD700, #FF6B35);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .nav-logo .logo-icon { font-size: 30px; }

  .nav-tabs {
    display: flex; gap: 8px;
  }

  .nav-tab {
    padding: 8px 20px; border-radius: 20px; cursor: pointer;
    font-size: 14px; font-weight: 500; transition: all 0.3s;
    border: 1px solid transparent;
    color: var(--text-muted);
    background: transparent;
  }

  .nav-tab:hover {
    color: var(--gold);
    border-color: rgba(255,215,0,0.3);
  }

  .nav-tab.active {
    background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,107,53,0.2));
    border-color: rgba(255,215,0,0.5);
    color: var(--gold);
  }

  /* ===== 页面容器 ===== */
  .page { display: none; position: relative; z-index: 10; }
  .page.active { display: block; }

  /* ===== 主抽奖页 ===== */
  #page-lottery {
    min-height: calc(100vh - 70px);
    display: flex; flex-direction: column; align-items: center;
    padding: 30px 20px;
  }

  .lottery-header {
    text-align: center; margin-bottom: 30px;
  }

  .lottery-title {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900; letter-spacing: 4px;
    background: linear-gradient(135deg, #FFD700 0%, #FF6B35 50%, #FFD700 100%);
    background-size: 200% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
    text-shadow: none;
  }

  @keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .lottery-subtitle {
    margin-top: 8px; font-size: 16px; color: var(--text-muted); letter-spacing: 2px;
  }

  /* ===== 奖品选择卡片 ===== */
  .prize-selector {
    display: flex; gap: 16px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center;
  }

  .prize-card {
    cursor: pointer; border-radius: 16px; padding: 20px 28px;
    text-align: center; transition: all 0.3s; position: relative; overflow: hidden;
    border: 2px solid transparent; min-width: 160px;
    background: var(--bg-card);
    backdrop-filter: blur(10px);
  }

  .prize-card::before {
    content: ''; position: absolute; inset: 0;
    background: inherit; opacity: 0; transition: opacity 0.3s; border-radius: 14px;
  }

  .prize-card.first {
    border-color: rgba(255,107,53,0.4);
    background: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(255,60,0,0.1));
  }
  .prize-card.second {
    border-color: rgba(192,192,192,0.4);
    background: linear-gradient(135deg, rgba(192,192,192,0.15), rgba(160,160,160,0.1));
  }
  .prize-card.third {
    border-color: rgba(205,127,50,0.4);
    background: linear-gradient(135deg, rgba(205,127,50,0.15), rgba(180,100,30,0.1));
  }

  .prize-card.selected {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(255,215,0,0.3);
    border-color: var(--gold) !important;
  }

  .prize-card.selected::after {
    content: '✓';
    position: absolute; top: 8px; right: 12px;
    color: var(--gold); font-size: 16px; font-weight: 700;
  }

  .prize-icon { font-size: 36px; margin-bottom: 8px; }
  .prize-level {
    font-size: 12px; font-weight: 700; letter-spacing: 2px; opacity: 0.7;
    text-transform: uppercase;
  }
  .prize-name { font-size: 15px; font-weight: 600; margin: 4px 0; }
  .prize-count { font-size: 12px; opacity: 0.6; }
  .prize-remain { font-size: 11px; margin-top: 4px; color: var(--gold); }

  /* ===== 抽奖转盘区 ===== */
  .lottery-stage {
    width: 100%; max-width: 900px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,215,0,0.15);
    border-radius: 24px;
    padding: 30px;
    backdrop-filter: blur(20px);
    margin-bottom: 24px;
  }

  /* 滚动名单区 */
  .roll-container {
    position: relative;
    height: 120px;
    overflow: hidden;
    border-radius: 12px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,215,0,0.1);
    margin-bottom: 24px;
  }

  .roll-mask-top, .roll-mask-bottom {
    position: absolute; left: 0; right: 0; height: 30px; z-index: 2; pointer-events: none;
  }
  .roll-mask-top { top: 0; background: linear-gradient(to bottom, rgba(10,10,26,0.9), transparent); }
  .roll-mask-bottom { bottom: 0; background: linear-gradient(to top, rgba(10,10,26,0.9), transparent); }

  .roll-highlight {
    position: absolute; left: 0; right: 0;
    top: 50%; transform: translateY(-50%);
    height: 40px; z-index: 1;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.08), rgba(255,215,0,0.12), rgba(255,215,0,0.08), transparent);
    border-top: 1px solid rgba(255,215,0,0.2);
    border-bottom: 1px solid rgba(255,215,0,0.2);
  }

  .roll-list {
    position: absolute; top: 0; left: 0; right: 0;
    transition: transform 0s;
  }

  .roll-item {
    height: 40px; display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700; letter-spacing: 4px;
    color: rgba(255,255,255,0.7);
  }

  .roll-item.highlight { color: var(--gold); font-size: 26px; }

  /* 抽奖按钮 */
  .lottery-btn-area { display: flex; gap: 16px; justify-content: center; align-items: center; flex-wrap: wrap; }

  .btn-draw {
    position: relative; cursor: pointer; border: none; outline: none;
    padding: 18px 60px; border-radius: 50px; font-size: 20px; font-weight: 800;
    letter-spacing: 3px; overflow: hidden;
    background: linear-gradient(135deg, #FFD700, #FF6B35, #FFD700);
    background-size: 200% auto;
    color: #1a0a00;
    box-shadow: 0 8px 30px rgba(255,215,0,0.4);
    transition: all 0.3s;
    animation: btnPulse 2s ease-in-out infinite;
  }

  .btn-draw:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(255,215,0,0.6);
    animation: none;
    background-position: right center;
  }

  .btn-draw:active { transform: scale(0.97); }
  .btn-draw:disabled {
    opacity: 0.5; cursor: not-allowed; animation: none;
    transform: none;
  }

  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 8px 30px rgba(255,215,0,0.4); }
    50% { box-shadow: 0 8px 50px rgba(255,215,0,0.7); }
  }

  .btn-draw .btn-shine {
    position: absolute; top: -50%; left: -60%; width: 40%; height: 200%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transform: skewX(-20deg);
    animation: btnShine 3s linear infinite;
  }

  @keyframes btnShine {
    0% { left: -60%; }
    100% { left: 140%; }
  }

  .btn-reset {
    cursor: pointer; border: 1px solid rgba(255,255,255,0.2); outline: none;
    padding: 14px 30px; border-radius: 50px; font-size: 15px;
    background: rgba(255,255,255,0.08); color: var(--text-muted);
    transition: all 0.3s;
  }
  .btn-reset:hover { background: rgba(255,255,255,0.15); color: var(--text); }

  /* ===== 中奖结果弹窗 ===== */
  .result-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    align-items: center; justify-content: center;
  }
  .result-overlay.show { display: flex; }

  .result-modal {
    position: relative;
    text-align: center;
    padding: 50px 60px;
    border-radius: 24px;
    max-width: 600px; width: 90%;
    animation: modalIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.5) translateY(40px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .result-modal.first-prize {
    background: linear-gradient(135deg, #1a0800, #2d1200, #1a0800);
    border: 2px solid var(--first);
    box-shadow: 0 0 60px rgba(255,107,53,0.5), inset 0 0 40px rgba(255,107,53,0.1);
  }
  .result-modal.second-prize {
    background: linear-gradient(135deg, #0d0d0d, #1a1a1a, #0d0d0d);
    border: 2px solid var(--second);
    box-shadow: 0 0 60px rgba(192,192,192,0.5), inset 0 0 40px rgba(192,192,192,0.1);
  }
  .result-modal.third-prize {
    background: linear-gradient(135deg, #0d0800, #1a1000, #0d0800);
    border: 2px solid var(--third);
    box-shadow: 0 0 60px rgba(205,127,50,0.5), inset 0 0 40px rgba(205,127,50,0.1);
  }

  .result-fireworks {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: 24px;
  }

  .result-badge {
    display: inline-block; padding: 6px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 700; letter-spacing: 3px; margin-bottom: 16px;
  }
  .first-prize .result-badge { background: var(--first); color: #fff; }
  .second-prize .result-badge { background: var(--second); color: #000; }
  .third-prize .result-badge { background: var(--third); color: #fff; }

  .result-icon { font-size: 64px; margin: 10px 0; animation: iconBounce 0.8s ease forwards; }
  @keyframes iconBounce {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .result-prize-name {
    font-size: 26px; font-weight: 900; margin: 12px 0;
    background: linear-gradient(90deg, #FFD700, #FFF, #FFD700);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .result-winner {
    font-size: 44px; font-weight: 900; color: #FFF;
    text-shadow: 0 0 30px rgba(255,215,0,0.8);
    margin: 8px 0;
    animation: winnerGlow 1s ease-out forwards 0.3s;
  }
  @keyframes winnerGlow {
    from { text-shadow: 0 0 0px transparent; }
    to { text-shadow: 0 0 30px rgba(255,215,0,0.8); }
  }

  .result-dept { font-size: 16px; color: rgba(255,255,255,0.6); margin-bottom: 24px; }

  .result-close {
    cursor: pointer; border: none; outline: none;
    padding: 12px 40px; border-radius: 50px; font-size: 16px; font-weight: 600;
    background: linear-gradient(135deg, #FFD700, #FF6B35);
    color: #1a0a00; transition: all 0.3s;
  }
  .result-close:hover { transform: scale(1.05); }

  /* ===== 最近中奖展示条 ===== */
  .winner-ticker {
    width: 100%; max-width: 900px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,215,0,0.1);
    border-radius: 12px;
    padding: 12px 20px;
    display: flex; align-items: center; gap: 12px;
    overflow: hidden;
  }

  .ticker-label {
    font-size: 12px; font-weight: 700; color: var(--gold);
    letter-spacing: 1px; white-space: nowrap;
    padding: 4px 10px; background: rgba(255,215,0,0.1);
    border-radius: 6px;
  }

  .ticker-scroll {
    flex: 1; overflow: hidden; position: relative; height: 24px;
  }

  .ticker-inner {
    display: flex; gap: 40px; white-space: nowrap;
    animation: tickerScroll 20s linear infinite;
    position: absolute;
  }

  @keyframes tickerScroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .ticker-item {
    font-size: 13px; color: rgba(255,255,255,0.7);
    display: flex; align-items: center; gap: 6px;
  }

  .ticker-item .t-dot { width: 6px; height: 6px; border-radius: 50%; }
  .ticker-item.t1 .t-dot { background: var(--first); }
  .ticker-item.t2 .t-dot { background: var(--second); }
  .ticker-item.t3 .t-dot { background: var(--third); }

  /* ===== 后台管理页 ===== */
  #page-admin {
    max-width: 1100px; margin: 0 auto;
    padding: 30px 20px;
  }

  .admin-title {
    font-size: 24px; font-weight: 800; color: var(--gold);
    margin-bottom: 24px; display: flex; align-items: center; gap: 10px;
  }

  .admin-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
  }
  @media (max-width: 768px) { .admin-grid { grid-template-columns: 1fr; } }

  .admin-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 24px;
    backdrop-filter: blur(10px);
  }

  .admin-card.full-width { grid-column: 1 / -1; }

  .card-title {
    font-size: 16px; font-weight: 700; color: var(--gold);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  /* 人员导入 */
  .import-area {
    border: 2px dashed rgba(255,215,0,0.3);
    border-radius: 12px; padding: 30px; text-align: center;
    cursor: pointer; transition: all 0.3s; margin-bottom: 16px;
    background: rgba(255,215,0,0.02);
  }
  .import-area:hover, .import-area.dragover {
    border-color: var(--gold);
    background: rgba(255,215,0,0.06);
  }
  .import-icon { font-size: 36px; margin-bottom: 8px; }
  .import-tip { font-size: 14px; color: var(--text-muted); margin-bottom: 4px; }
  .import-sub { font-size: 12px; color: rgba(255,255,255,0.3); }

  .import-input { display: none; }

  .person-list {
    max-height: 200px; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: rgba(255,215,0,0.3) transparent;
  }

  .person-tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; margin: 3px;
    background: rgba(255,255,255,0.08); border-radius: 20px;
    font-size: 13px; color: var(--text-muted);
  }

  .person-tag .remove-btn {
    cursor: pointer; color: rgba(255,255,255,0.3); font-size: 12px;
    transition: color 0.2s;
  }
  .person-tag .remove-btn:hover { color: #FF6B6B; }

  .manual-add { display: flex; gap: 8px; margin-top: 12px; }
  .admin-input {
    flex: 1; padding: 10px 14px; border-radius: 8px; font-size: 14px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: var(--text); outline: none; transition: border-color 0.3s;
  }
  .admin-input:focus { border-color: var(--gold); }
  .admin-input::placeholder { color: rgba(255,255,255,0.3); }

  .admin-btn {
    padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
    border: none; outline: none; cursor: pointer; transition: all 0.2s;
    white-space: nowrap;
  }
  .admin-btn.primary {
    background: linear-gradient(135deg, #FFD700, #FF6B35);
    color: #1a0a00;
  }
  .admin-btn.primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .admin-btn.danger { background: rgba(255,80,80,0.15); color: #FF8080; border: 1px solid rgba(255,80,80,0.3); }
  .admin-btn.danger:hover { background: rgba(255,80,80,0.25); }
  .admin-btn.secondary { background: rgba(255,255,255,0.1); color: var(--text-muted); }
  .admin-btn.secondary:hover { background: rgba(255,255,255,0.15); color: var(--text); }

  .people-count {
    margin-top: 8px; font-size: 13px; color: var(--text-muted);
    display: flex; align-items: center; justify-content: space-between;
  }

  /* 奖品设置 */
  .prize-list-admin { display: flex; flex-direction: column; gap: 12px; }

  .prize-admin-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 12px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  }

  .prize-admin-icon { font-size: 24px; min-width: 32px; text-align: center; }

  .prize-admin-info { flex: 1; }
  .prize-admin-level { font-size: 11px; font-weight: 700; letter-spacing: 2px; opacity: 0.6; }
  .prize-admin-name { font-size: 15px; font-weight: 600; margin: 2px 0; }

  .prize-admin-count {
    display: flex; align-items: center; gap: 8px;
  }
  .count-btn {
    width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08); color: var(--text); cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .count-btn:hover { background: rgba(255,215,0,0.2); border-color: var(--gold); color: var(--gold); }
  .count-display {
    min-width: 40px; text-align: center; font-size: 16px; font-weight: 700; color: var(--gold);
  }

  .prize-edit-input {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px; padding: 4px 8px; font-size: 14px; color: var(--text);
    outline: none; width: 180px; transition: border-color 0.3s;
  }
  .prize-edit-input:focus { border-color: var(--gold); }

  /* 中奖记录 */
  .record-table {
    width: 100%; border-collapse: collapse;
  }

  .record-table th {
    text-align: left; padding: 10px 14px; font-size: 12px;
    font-weight: 700; letter-spacing: 1px; opacity: 0.5;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    white-space: nowrap;
  }

  .record-table td {
    padding: 10px 14px; font-size: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .record-table tr:last-child td { border-bottom: none; }
  .record-table tr:hover td { background: rgba(255,255,255,0.03); }

  .prize-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 600;
  }
  .prize-badge.p1 { background: rgba(255,107,53,0.2); color: #FF8A60; }
  .prize-badge.p2 { background: rgba(192,192,192,0.2); color: #CDCDCD; }
  .prize-badge.p3 { background: rgba(205,127,50,0.2); color: #E8A060; }

  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--text-muted); font-size: 14px;
  }
  .empty-icon { font-size: 36px; margin-bottom: 8px; opacity: 0.4; }

  .record-actions {
    display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end;
  }

  /* ===== 彩纸特效 ===== */
  .confetti-piece {
    position: fixed; width: 10px; height: 10px;
    pointer-events: none; z-index: 9999;
    animation: confettiFall linear forwards;
    border-radius: 2px;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ===== 滚动条 ===== */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.3); border-radius: 2px; }

  /* ===== 粒子特效 ===== */
  .particle {
    position: fixed; pointer-events: none; z-index: 9998;
    border-radius: 50%; animation: particleFloat linear forwards;
  }
  @keyframes particleFloat {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }

  /* 状态指示 */
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 6px;
  }
  .status-dot.online { background: #4CAF50; animation: dotPulse 2s infinite; }
  @keyframes dotPulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 4px #4CAF50; }
    50% { opacity: 0.5; box-shadow: 0 0 10px #4CAF50; }
  }
</style>
</head>
<body>

<!-- 星空背景 -->
<div id="starfield"></div>

<!-- 导航栏 -->
<nav class="nav">
  <div class="nav-logo">
    <span class="logo-icon">🎊</span>
    <span>年会抽奖系统</span>
  </div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="switchPage('lottery')">🎰 抽奖大厅</div>
    <div class="nav-tab" onclick="switchPage('admin')">⚙️ 后台管理</div>
  </div>
  <div style="font-size:13px;color:var(--text-muted);">
    <span class="status-dot online"></span>
    <span id="people-status">0 位参与者</span>
  </div>
</nav>

<!-- ===== 抽奖大厅 ===== -->
<div id="page-lottery" class="page active">
  <div class="lottery-header">
    <div class="lottery-title">🎊 年度盛典·幸运时刻 🎊</div>
    <div class="lottery-subtitle">感谢您的付出与陪伴，好运属于你</div>
  </div>

  <!-- 奖品选择 -->
  <div class="prize-selector" id="prizeSelectorArea">
    <div class="prize-card first selected" data-prize="1" onclick="selectPrize(1)">
      <div class="prize-icon">🚗</div>
      <div class="prize-level">一等奖</div>
      <div class="prize-name" id="prize1-name">小米 SU7</div>
      <div class="prize-count" id="prize1-total">共 1 名</div>
      <div class="prize-remain" id="prize1-remain">剩余 1 名</div>
    </div>
    <div class="prize-card second" data-prize="2" onclick="selectPrize(2)">
      <div class="prize-icon">📱</div>
      <div class="prize-level">二等奖</div>
      <div class="prize-name" id="prize2-name">iPhone 17 Pro Max</div>
      <div class="prize-count" id="prize2-total">共 5 名</div>
      <div class="prize-remain" id="prize2-remain">剩余 5 名</div>
    </div>
    <div class="prize-card third" data-prize="3" onclick="selectPrize(3)">
      <div class="prize-icon">🛒</div>
      <div class="prize-level">三等奖</div>
      <div class="prize-name" id="prize3-name">山姆会员年卡</div>
      <div class="prize-count" id="prize3-total">共 20 名</div>
      <div class="prize-remain" id="prize3-remain">剩余 20 名</div>
    </div>
  </div>

  <!-- 抽奖舞台 -->
  <div class="lottery-stage">
    <div class="roll-container" id="rollContainer">
      <div class="roll-mask-top"></div>
      <div class="roll-mask-bottom"></div>
      <div class="roll-highlight"></div>
      <div class="roll-list" id="rollList">
        <div class="roll-item highlight" style="color:rgba(255,255,255,0.3);">等待开始...</div>
      </div>
    </div>

    <div class="lottery-btn-area">
      <button class="btn-draw" id="drawBtn" onclick="startDraw()">
        <span class="btn-shine"></span>
        🎰 开始抽奖
      </button>
      <button class="btn-reset" onclick="resetDraw()">↺ 重置本轮</button>
    </div>
  </div>

  <!-- 中奖滚动条 -->
  <div class="winner-ticker" id="winnerTicker" style="display:none;">
    <div class="ticker-label">🏆 中奖名单</div>
    <div class="ticker-scroll">
      <div class="ticker-inner" id="tickerInner"></div>
    </div>
  </div>
</div>

<!-- ===== 后台管理 ===== -->
<div id="page-admin" class="page">
  <div class="admin-title">⚙️ 后台管理</div>
  <div class="admin-grid">

    <!-- 人员导入 -->
    <div class="admin-card">
      <div class="card-title">👥 参与人员管理</div>
      <div class="import-area" id="importArea"
        onclick="document.getElementById('fileInput').click()"
        ondragover="event.preventDefault();this.classList.add('dragover')"
        ondragleave="this.classList.remove('dragover')"
        ondrop="handleFileDrop(event)">
        <div class="import-icon">📂</div>
        <div class="import-tip">点击上传 或 拖拽文件到此处</div>
        <div class="import-sub">支持 .txt（每行一个姓名）或 .csv 文件</div>
      </div>
      <input type="file" id="fileInput" class="import-input" accept=".txt,.csv" onchange="handleFileUpload(event)">

      <div class="manual-add">
        <input class="admin-input" id="manualName" placeholder="输入姓名，按回车添加" onkeydown="if(event.key==='Enter')addPerson()">
        <button class="admin-btn primary" onclick="addPerson()">添加</button>
        <button class="admin-btn danger" onclick="clearPeople()">清空</button>
      </div>

      <div class="people-count">
        <span>共 <strong id="personCount" style="color:var(--gold)">0</strong> 位参与者</span>
        <span style="font-size:11px;opacity:0.4;">已抽出不重复参与本轮次</span>
      </div>

      <div class="person-list" id="personList"></div>
    </div>

    <!-- 奖品设置 -->
    <div class="admin-card">
      <div class="card-title">🎁 奖品设置</div>
      <div class="prize-list-admin" id="prizeListAdmin"></div>
    </div>

    <!-- 中奖记录 -->
    <div class="admin-card full-width">
      <div class="card-title">🏆 中奖记录</div>
      <div id="recordContent">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div>暂无中奖记录，快去开始抽奖吧！</div>
        </div>
      </div>
      <div class="record-actions">
        <button class="admin-btn secondary" onclick="exportRecords()">📤 导出记录</button>
        <button class="admin-btn danger" onclick="clearRecords()">🗑️ 清空记录</button>
      </div>
    </div>

  </div>
</div>

<!-- 中奖弹窗 -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-modal" id="resultModal">
    <div class="result-fireworks" id="resultFireworks"></div>
    <div class="result-badge" id="resultBadge">一等奖</div>
    <div class="result-icon" id="resultIcon">🚗</div>
    <div class="result-prize-name" id="resultPrizeName">小米 SU7</div>
    <div style="font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:8px;">恭喜</div>
    <div class="result-winner" id="resultWinner">王小明</div>
    <div class="result-dept" id="resultDept"></div>
    <button class="result-close" onclick="closeResult()">太棒了！继续抽 🎉</button>
  </div>
</div>

<script>
// ===== 数据状态 =====
const state = {
  people: [],         // 全部人员
  drawnPeople: [],    // 已抽到的人（本次会话内不重复）
  selectedPrize: 1,
  isDrawing: false,
  prizes: [
    { id: 1, level: '一等奖', name: '小米 SU7', icon: '🚗', total: 1, remaining: 1, colorClass: 'first-prize', badgeClass: 'p1' },
    { id: 2, level: '二等奖', name: 'iPhone 17 Pro Max', icon: '📱', total: 5, remaining: 5, colorClass: 'second-prize', badgeClass: 'p2' },
    { id: 3, level: '三等奖', name: '山姆会员年卡', icon: '🛒', total: 20, remaining: 20, colorClass: 'third-prize', badgeClass: 'p3' },
  ],
  records: [],
};

// ===== 星空初始化 =====
(function initStars() {
  const sf = document.getElementById('starfield');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      animation-duration:${Math.random()*4+2}s;
      animation-delay:${Math.random()*4}s;
    `;
    sf.appendChild(s);
  }
})();

// ===== 页面切换 =====
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nav-tab')[name === 'lottery' ? 0 : 1].classList.add('active');
  if (name === 'admin') renderAdmin();
}

// ===== 奖品选择 =====
function selectPrize(id) {
  state.selectedPrize = id;
  document.querySelectorAll('.prize-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.prize-card[data-prize="${id}"]`).classList.add('selected');
  // 重置滚动到待机状态
  const rollList = document.getElementById('rollList');
  rollList.innerHTML = '<div class="roll-item highlight" style="color:rgba(255,255,255,0.3);">等待开始...</div>';
  rollList.style.transition = 'none';
  rollList.style.transform = 'translateY(0)';
}

// ===== 更新奖品显示 =====
function updatePrizeDisplay() {
  state.prizes.forEach(p => {
    const nameEl = document.getElementById(`prize${p.id}-name`);
    const totalEl = document.getElementById(`prize${p.id}-total`);
    const remainEl = document.getElementById(`prize${p.id}-remain`);
    if (nameEl) nameEl.textContent = p.name;
    if (totalEl) totalEl.textContent = `共 ${p.total} 名`;
    if (remainEl) remainEl.textContent = p.remaining <= 0 ? '⚠️ 已抽完' : `剩余 ${p.remaining} 名`;
  });
  // 更新人员状态
  const available = state.people.filter(p => !state.drawnPeople.includes(p));
  document.getElementById('people-status').textContent = `${available.length} 位参与者`;
}

// ===== 抽奖逻辑 =====
let rollTimer = null;
let rollSpeed = 40;

function startDraw() {
  const prize = state.prizes.find(p => p.id === state.selectedPrize);
  if (!prize) return;
  if (prize.remaining <= 0) {
    alert(`${prize.level}奖品已抽完！`);
    return;
  }
  const available = state.people.filter(p => !state.drawnPeople.includes(p));
  if (available.length === 0) {
    alert('没有可参与抽奖的人员！请先在后台管理中导入人员。');
    return;
  }

  if (state.isDrawing) return;
  state.isDrawing = true;
  document.getElementById('drawBtn').disabled = true;
  document.getElementById('drawBtn').textContent = '🎲 抽奖中...';

  // 准备滚动名单（随机排列可用人员）
  const shuffled = [...available].sort(() => Math.random() - 0.5);
  const winner = shuffled[0];
  const displayList = [];

  // 先填充随机名字，最后确保winner出现
  for (let i = 0; i < 30; i++) {
    displayList.push(shuffled[i % shuffled.length]);
  }
  displayList.push(winner);

  const rollList = document.getElementById('rollList');
  rollList.style.transition = 'none';
  rollList.style.transform = 'translateY(0)';
  rollList.innerHTML = '';

  displayList.forEach((name, idx) => {
    const div = document.createElement('div');
    div.className = 'roll-item' + (idx === displayList.length - 1 ? ' highlight' : '');
    div.textContent = name;
    rollList.appendChild(div);
  });

  // 添加额外padding div
  const pad = document.createElement('div');
  pad.className = 'roll-item';
  pad.style.height = '40px';
  rollList.appendChild(pad);

  // 动画滚动
  let currentIdx = 0;
  let phase = 'accelerate'; // accelerate -> fast -> decelerate -> stop
  let speed = 200;
  let totalFrames = 0;
  const targetIdx = displayList.length - 1;

  function rollFrame() {
    totalFrames++;
    currentIdx++;

    if (currentIdx >= displayList.length) {
      // 滚动到winner
      showResult(winner, prize);
      return;
    }

    // 计算当前位置
    const yOffset = -(currentIdx * 40) + 40; // 中间对齐
    rollList.style.transition = `transform ${speed}ms ease`;
    rollList.style.transform = `translateY(${yOffset}px)`;

    // 速度控制
    if (totalFrames < 8) {
      speed = Math.max(50, speed - 20);
    } else if (currentIdx < targetIdx - 8) {
      speed = 50;
    } else {
      // 减速
      const remaining = targetIdx - currentIdx;
      speed = 50 + (8 - remaining) * 60;
    }

    rollTimer = setTimeout(rollFrame, speed);
  }

  rollTimer = setTimeout(rollFrame, speed);
}

function showResult(winner, prize) {
  // 更新状态
  state.drawnPeople.push(winner);
  prize.remaining--;

  // 添加记录
  const record = {
    id: state.records.length + 1,
    winner,
    prize: prize.name,
    level: prize.level,
    icon: prize.icon,
    badgeClass: prize.badgeClass,
    time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
  };
  state.records.unshift(record);

  // 更新显示
  updatePrizeDisplay();
  updateTickerDisplay();

  // 弹窗
  const modal = document.getElementById('resultModal');
  modal.className = `result-modal ${prize.colorClass}`;
  document.getElementById('resultBadge').textContent = prize.level;
  document.getElementById('resultIcon').textContent = prize.icon;
  document.getElementById('resultPrizeName').textContent = prize.name;
  document.getElementById('resultWinner').textContent = winner;
  document.getElementById('resultOverlay').classList.add('show');

  // 彩纸特效
  launchConfetti();

  state.isDrawing = false;
  document.getElementById('drawBtn').disabled = false;
  document.getElementById('drawBtn').innerHTML = '<span class="btn-shine"></span>🎰 开始抽奖';
}

function closeResult() {
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('resultFireworks').innerHTML = '';
}

function resetDraw() {
  if (state.isDrawing) return;
  const rollList = document.getElementById('rollList');
  rollList.style.transition = 'none';
  rollList.style.transform = 'translateY(0)';
  rollList.innerHTML = '<div class="roll-item highlight" style="color:rgba(255,255,255,0.3);">等待开始...</div>';
}

// ===== 彩纸特效 =====
function launchConfetti() {
  const colors = ['#FFD700', '#FF6B35', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.cssText = `
        left: ${Math.random() * 100}vw;
        top: -10px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        width: ${Math.random() * 8 + 5}px;
        height: ${Math.random() * 8 + 5}px;
        animation-duration: ${Math.random() * 2 + 2}s;
        animation-delay: ${Math.random() * 0.5}s;
        transform: rotate(${Math.random() * 360}deg);
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      `;
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }, i * 15);
  }
}

// ===== 中奖滚动条 =====
function updateTickerDisplay() {
  if (state.records.length === 0) return;
  document.getElementById('winnerTicker').style.display = 'flex';

  const inner = document.getElementById('tickerInner');
  const items = [...state.records, ...state.records]; // 复制一份形成无缝循环
  inner.innerHTML = items.map(r => `
    <div class="ticker-item t${r.badgeClass.replace('p','')}">
      <span class="t-dot"></span>
      <span>${r.winner}</span>
      <span style="opacity:0.5;">获得</span>
      <span>${r.icon} ${r.prize}</span>
    </div>
  `).join('');
}

// ===== 人员管理 =====
function addPerson() {
  const input = document.getElementById('manualName');
  const name = input.value.trim();
  if (!name) return;
  if (state.people.includes(name)) {
    alert(`"${name}" 已在名单中`);
    return;
  }
  state.people.push(name);
  input.value = '';
  renderPersonList();
  updatePrizeDisplay();
}

function removePerson(name) {
  state.people = state.people.filter(p => p !== name);
  state.drawnPeople = state.drawnPeople.filter(p => p !== name);
  renderPersonList();
  updatePrizeDisplay();
}

function clearPeople() {
  if (!confirm('确定清空全部人员名单？')) return;
  state.people = [];
  state.drawnPeople = [];
  renderPersonList();
  updatePrizeDisplay();
}

function renderPersonList() {
  const list = document.getElementById('personList');
  document.getElementById('personCount').textContent = state.people.length;
  if (state.people.length === 0) {
    list.innerHTML = '<div style="font-size:13px;color:rgba(255,255,255,0.3);padding:12px 0;">暂无人员，请添加或上传</div>';
    return;
  }
  list.innerHTML = state.people.map(name => `
    <span class="person-tag ${state.drawnPeople.includes(name) ? 'style="opacity:0.4;"' : ''}">
      ${state.drawnPeople.includes(name) ? '✓ ' : ''}${name}
      <span class="remove-btn" onclick="removePerson('${name.replace(/'/g,"\\'")}')">✕</span>
    </span>
  `).join('');
}

// ===== 文件上传 =====
function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  readFile(file);
  event.target.value = '';
}

function handleFileDrop(event) {
  event.preventDefault();
  event.currentTarget.classList.remove('dragover');
  const file = event.dataTransfer.files[0];
  if (file) readFile(file);
}

function readFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    const lines = text.split(/[\r\n,，]+/).map(l => l.trim()).filter(l => l && l.length > 0);
    let added = 0;
    lines.forEach(name => {
      // 跳过纯数字、常见表头
      if (/^\d+$/.test(name)) return;
      if (['姓名', 'name', '名字', '员工姓名'].includes(name.toLowerCase())) return;
      if (!state.people.includes(name)) {
        state.people.push(name);
        added++;
      }
    });
    renderPersonList();
    updatePrizeDisplay();
    alert(`成功导入 ${added} 位人员！（跳过重复 ${lines.length - added} 条）`);
  };
  reader.readAsText(file, 'UTF-8');
}

// ===== 奖品设置渲染 =====
function renderPrizeAdmin() {
  const container = document.getElementById('prizeListAdmin');
  container.innerHTML = state.prizes.map(p => `
    <div class="prize-admin-item">
      <div class="prize-admin-icon">${p.icon}</div>
      <div class="prize-admin-info">
        <div class="prize-admin-level">${p.level}</div>
        <input class="prize-edit-input" value="${p.name}"
          onchange="updatePrizeName(${p.id}, this.value)"
          oninput="updatePrizeName(${p.id}, this.value)">
      </div>
      <div class="prize-admin-count">
        <button class="count-btn" onclick="adjustCount(${p.id}, -1)">−</button>
        <div class="count-display" id="admin-count-${p.id}">${p.total}</div>
        <button class="count-btn" onclick="adjustCount(${p.id}, 1)">＋</button>
      </div>
    </div>
  `).join('');
}

function updatePrizeName(id, name) {
  const p = state.prizes.find(p => p.id === id);
  if (p) {
    p.name = name;
    updatePrizeDisplay();
  }
}

function adjustCount(id, delta) {
  const p = state.prizes.find(p => p.id === id);
  if (!p) return;
  const newTotal = Math.max(1, p.total + delta);
  const drawn = p.total - p.remaining;
  p.total = newTotal;
  p.remaining = Math.max(0, newTotal - drawn);
  document.getElementById(`admin-count-${id}`).textContent = p.total;
  updatePrizeDisplay();
}

// ===== 中奖记录 =====
function renderRecords() {
  const content = document.getElementById('recordContent');
  if (state.records.length === 0) {
    content.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div>暂无中奖记录，快去开始抽奖吧！</div>
      </div>
    `;
    return;
  }

  content.innerHTML = `
    <table class="record-table">
      <thead>
        <tr>
          <th>#</th>
          <th>获奖者</th>
          <th>奖品</th>
          <th>奖项</th>
          <th>时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        ${state.records.map((r, idx) => `
          <tr>
            <td style="opacity:0.4;">${state.records.length - idx}</td>
            <td style="font-weight:600;">${r.winner}</td>
            <td>${r.icon} ${r.prize}</td>
            <td><span class="prize-badge ${r.badgeClass}">${r.level}</span></td>
            <td style="opacity:0.5;font-size:12px;">${r.time}</td>
            <td>
              <button class="admin-btn danger" style="padding:4px 10px;font-size:12px;"
                onclick="removeRecord(${r.id})">撤销</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function removeRecord(id) {
  const record = state.records.find(r => r.id === id);
  if (!record || !confirm(`确定撤销 ${record.winner} 的中奖记录？（将退回参与资格）`)) return;

  // 恢复参与资格
  state.drawnPeople = state.drawnPeople.filter(p => p !== record.winner);

  // 恢复奖品数量
  const prize = state.prizes.find(p => p.name === record.prize);
  if (prize) prize.remaining++;

  state.records = state.records.filter(r => r.id !== id);
  renderRecords();
  updatePrizeDisplay();
  renderPersonList();
  updateTickerDisplay();
}

function clearRecords() {
  if (!confirm('确定清空所有中奖记录？此操作将恢复所有人员的参与资格和奖品数量！')) return;
  state.records = [];
  state.drawnPeople = [];
  state.prizes.forEach(p => p.remaining = p.total);
  renderRecords();
  updatePrizeDisplay();
  renderPersonList();
  document.getElementById('winnerTicker').style.display = 'none';
}

function exportRecords() {
  if (state.records.length === 0) { alert('暂无记录可导出'); return; }
  const header = '序号,获奖者,奖品,奖项,时间\n';
  const rows = [...state.records].reverse().map((r, i) =>
    `${i+1},${r.winner},${r.prize},${r.level},${r.time}`
  ).join('\n');
  const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `中奖记录_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.csv`;
  a.click();
}

function renderAdmin() {
  renderPersonList();
  renderPrizeAdmin();
  renderRecords();
}
